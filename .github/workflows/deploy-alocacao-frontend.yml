name: Deploy Alocacao Frontend
on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/alocacao-service/frontend/**'
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./services/alocacao-service/frontend
          push: true
          tags: origemglobaltecnologia/logistica-pro-alocacao-frontend:latest
